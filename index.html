<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BlankRoom</title>
  <link rel="stylesheet" href="style.css" />
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

</head>
<body>

<!-- LANDING PAGE -->
<div id="page-landing" class="page active">
  <div class="center-wrap">
    <h1 class="logo">Blank<span>Room</span></h1>
    <p class="tagline">Anonymous. Temporary. Gone when you leave.</p>

    <div class="disclaimer">
      Chats are anonymous and not stored. All messages disappear when you disconnect.
    </div>

    <div class="form-group">
      <input type="text" id="nickname-input" placeholder="Enter a nickname (optional)" maxlength="20" autocomplete="off" />
    </div>

    <div class="form-group checkbox-row">
      <input type="checkbox" id="age-check" />
      <label for="age-check">I confirm I am 18 years of age or older</label>
    </div>

    <div class="btn-group">
      <button class="btn" id="btn-1v1">Start 1v1 Chat</button>
      <button class="btn" id="btn-group">Join Group Chat</button>
    </div>
  </div>
</div>

<!-- 1v1 CHAT PAGE -->
<div id="page-1v1" class="page">
  <div class="chat-wrap">
    <div class="chat-header">
      <span class="logo-sm">Blank<span>Room</span></span>
      <span id="status-1v1" class="status">Searching for a stranger...</span>
      <button class="btn-link" id="btn-report-1v1">report</button>
    </div>

    <div id="messages-1v1" class="messages-box"></div>

    <div class="input-row">
      <input type="text" id="input-1v1" placeholder="Type a message..." maxlength="500" autocomplete="off" disabled />
      <button class="btn btn-sm" id="btn-send-1v1" disabled>Send</button>
    </div>

    <div class="action-row">
      <button class="btn btn-outline" id="btn-end-1v1">End Chat</button>
      <button class="btn" id="btn-new-1v1">New Stranger</button>
      <button class="btn btn-outline" id="btn-back-1v1">← Back</button>
    </div>
  </div>
</div>

<!-- GROUP CHAT PAGE -->
<div id="page-group" class="page">
  <div class="chat-wrap">
    <div class="chat-header">
      <span class="logo-sm">Blank<span>Room</span></span>
      <span id="status-group" class="status">Group Chat</span>
      <button class="btn-link" id="btn-report-group">report</button>
    </div>

    <!-- Room selector -->
    <div id="room-selector">
      <div class="room-join-row">
        <input type="text" id="room-name-input" placeholder="Room name..." maxlength="30" autocomplete="off" />
        <button class="btn btn-sm" id="btn-join-room">Join</button>
      </div>
      <div class="room-list-label">Active rooms:</div>
      <div id="room-list"></div>
    </div>

    <div id="messages-group" class="messages-box" style="display:none;"></div>

    <div class="input-row" id="group-input-row" style="display:none;">
      <input type="text" id="input-group" placeholder="Type a message..." maxlength="500" autocomplete="off" />
      <button class="btn btn-sm" id="btn-send-group">Send</button>
    </div>

    <div class="action-row">
      <button class="btn btn-outline" id="btn-leave-room" style="display:none;">Leave Room</button>
      <button class="btn btn-outline" id="btn-back-group">← Back</button>
    </div>
  </div>
</div>

<!-- REPORT MODAL -->
<div id="report-modal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <h3>Report User</h3>
    <p>Reason:</p>
    <select id="report-reason">
      <option>Inappropriate content</option>
      <option>Harassment</option>
      <option>Spam</option>
      <option>Other</option>
    </select>
    <div class="btn-group" style="margin-top:12px;">
      <button class="btn btn-sm" id="btn-submit-report">Submit</button>
      <button class="btn-link" id="btn-cancel-report">Cancel</button>
    </div>
  </div>
</div>

<!--
  DEPLOYMENT NOTE:
  When deploying frontend to Vercel (separate from backend on Render),
  replace the BACKEND_URL below with your Render service URL.
  Example: window.BACKEND_URL = 'https://blankroom-backend.onrender.com';

  For local dev, leave it as '' (empty string = same origin).
-->
<script>
  window.BACKEND_URL = 'https://blankroom-server.onrender.com';
  // ↑ Production example:
  // window.BACKEND_URL = 'https://blankroom-backend.onrender.com';
</script>

<!-- socket.io: loaded from backend when same-origin, or CDN when split-deployed -->
<script>
  (function() {
    const backend = window.BACKEND_URL || '';
    const script = document.createElement('script');
    script.src = backend
      ? backend + '/socket.io/socket.io.js'
      : '/socket.io/socket.io.js';
    document.head.appendChild(script);
  })();
</script>
<script src="client.js" defer></script>
</body>
</html>
